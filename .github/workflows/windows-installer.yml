name: Windows installer build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 150

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-multimedia
            mingw-w64-x86_64-qt5-serialport
            mingw-w64-x86_64-qt5-websockets
            mingw-w64-x86_64-qt5-svg
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-activeqt
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-nsis
            autoconf
            automake
            libtool
            make

      # GCC 15 .tls_common regression + ABI mismatch strategy:
      # - pacman -U for gcc/gcc-fortran binaries (no reverse deps, safe)
      # - Direct tar extraction for gcc-libs DLLs, bypassing pacman DB to avoid
      #   the cc-libs reverse-dependency conflict that every installed package has.
      # fixup_bundle copies DLLs from /mingw64/bin/ into the NSIS installer;
      # overwriting them here ensures GCC 14 DLLs are bundled, not GCC 15.
      - name: Pin all GCC components to 14.2.0-3 (avoid .tls_common + DLL mismatch)
        run: |
          BASE=https://repo.msys2.org/mingw/mingw64

          # Pin compiler binaries via pacman (safe -- no reverse deps)
          pacman -U --noconfirm --nodeps \
            "${BASE}/mingw-w64-x86_64-gcc-14.2.0-3-any.pkg.tar.zst" \
            "${BASE}/mingw-w64-x86_64-gcc-fortran-14.2.0-3-any.pkg.tar.zst"

          gcc --version | head -1
          gfortran --version | head -1

      - name: Set up OmniRig COM interface (dumpcpp + OmniRig.tlb)
        run: |
          # MSYS2's qt5-activeqt ships dumpcpp as dumpcpp-qt5.exe; both
          # CMakeLists.txt and QtAxMacros.cmake hardcode the plain name.
          cp /mingw64/bin/dumpcpp-qt5.exe /mingw64/bin/dumpcpp.exe

          # Fetch OmniRig's type library directly from its source repo,
          # bypassing the COM registry CLSID lookup (which would hit a
          # WOW64 32-bit/64-bit registry-view mismatch on this toolchain).
          curl -sL -o OmniRig.tlb \
            https://raw.githubusercontent.com/VE3NEA/OmniRig/master/OmniRig.tlb
          ls -la OmniRig.tlb

      - name: Build and install Hamlib 4.5.5 from source
        run: |
          curl -L https://github.com/Hamlib/Hamlib/releases/download/4.5.5/hamlib-4.5.5.tar.gz \
            | tar xz
          cd hamlib-4.5.5
          ./configure \
            --prefix=/mingw64 \
            --disable-static \
            --without-cxx-binding \
            --disable-winradio
          make -j$(nproc)
          make install

      - name: Configure (CMake / MSYS2 MinGW64)
        run: |
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/mingw64 \
            -DCMAKE_PREFIX_PATH=/mingw64 \
            -DWSJT_SKIP_MANPAGES=ON \
            -DWSJT_GENERATE_DOCS=OFF \
            -DWSJT_BUILD_UTILS=OFF \
            -DWSJT_WITH_OMNIRIG=ON \
            -DOMNIRIG_TLB_PATH="$(cd .. && pwd)/OmniRig.tlb" \
            ..

      - name: Build
        run: |
          cd build
          ninja -j$(nproc)

      - name: Package (NSIS installer)
        run: |
          cd build
          cpack -G NSIS
          ls -lh *-win64.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: wsjt-y-windows-installer
          path: build/*-win64.exe
          retention-days: 30

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*-win64.exe
