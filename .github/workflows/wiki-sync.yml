name: Sync wiki

on:
  push:
    branches: [master]
    paths: ['wiki/**']

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    continue-on-error: true   # wiki git repo requires manual first-page creation via web UI
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Push wiki pages to GitHub wiki
        run: |
          git config --global user.email "2e0lxy@aprsnet.uk"
          git config --global user.name "2E0LXY"

          WIKI_URL="https://2E0LXY:${{ secrets.GITHUB_TOKEN }}@github.com/2E0LXY/wsjt-y.wiki.git"

          if git clone "$WIKI_URL" /tmp/wiki-repo 2>/dev/null; then
            echo "Wiki repo cloned OK"
          else
            echo "Wiki repo not yet initialised — creating it now"
            mkdir /tmp/wiki-repo
            cd /tmp/wiki-repo
            git init
            git remote add origin "$WIKI_URL"
            # GitHub wiki requires at least one page to exist; create a bootstrap Home page
            printf '# WSJT-Y Wiki\n\nFull documentation is synced automatically from the source repository.\n\nSee [Home](Home) for the main index.\n' > Home.md
            git add Home.md
            git commit -m "Bootstrap wiki"
            git push origin master
            cd -
          fi

          cp wiki/*.md /tmp/wiki-repo/

          cd /tmp/wiki-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to push"
            exit 0
          fi
          git commit -m "Sync wiki from source repo [$(git -C $GITHUB_WORKSPACE rev-parse --short HEAD)]"
          git push origin master
